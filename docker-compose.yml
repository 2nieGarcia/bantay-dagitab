version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: bantay-dagitab-db
    environment:
      POSTGRES_DB: bantay_dagitab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bantay-dagitab-backend
    environment:
      - DEBUG=True
      - SECRET_KEY=dev-secret-key-change-in-production
      - DATABASE_URL=postgres://postgres:postgres@db:5432/bantay_dagitab
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
    # Chatbot LLM provider (LLM_BASE_URL, LLM_API_KEY, LLM_MODEL,
    # LLM_TIMEOUT_SECONDS) is loaded from backend/.env per paper §IV.B.
    # IMPORTANT: copy backend/.env.example to backend/.env before
    # `docker compose up`. If LLM keys are blank, the chatbot returns
    # its fallback response instead of failing.
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - ./contracts:/app/contracts:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # FastAPI ML Service (anomaly detection + forecasting per paper §IV.C).
  # Does NOT host the chatbot — Django calls the external LLM API directly.
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: bantay-dagitab-ml
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - DEBUG=True
      - BACKEND_API_URL=http://backend:8000/api
    volumes:
      - ./ml:/app
      - ./contracts:/app/contracts:ro
    ports:
      - "8001:8001"
    depends_on:
      - backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # Frontend (when implemented)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: bantay-dagitab-frontend
  #   environment:
  #     - REACT_APP_API_URL=http://localhost:8000/api
  #     - REACT_APP_ML_API_URL=http://localhost:8001
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend
  #     - ml

volumes:
  postgres_data:

networks:
  default:
    name: bantay-dagitab-network

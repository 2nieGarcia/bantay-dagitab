services:
  # Django Backend API
  # All config (SECRET_KEY, DATABASE_URL, LLM_*, SERVICE_ACCOUNT_TOKEN)
  # comes from the centralized repo-root .env. Copy .env.example to .env
  # before `docker compose up`. If LLM keys are blank, the chatbot
  # returns its fallback response instead of failing.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bantay-dagitab-backend
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      # Where /api/iot/run-ml/ proxies the "Run inference now" trigger.
      - ML_SERVICE_URL=http://ml:8001
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - ./contracts:/app/contracts:ro
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # FastAPI ML Service (anomaly detection + forecasting per paper §IV.C).
  # Does NOT host the chatbot — Django calls the external LLM API directly.
  # All config (DATABASE_URL, SERVICE_ACCOUNT_TOKEN) comes from the
  # centralized repo-root .env. The service shares Supabase with Django
  # and reads from Django's iot_monitoring_iotreading; alerts are pushed
  # to Django via Contract C (paper §VI.F.2, X-Service-Token).
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: bantay-dagitab-ml
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8001
      # Override the host-mode default in .env so the worker reaches
      # the backend container over the docker network.
      - BACKEND_API_URL=http://backend:8000/api
    env_file:
      - ./.env
    volumes:
      - ./ml:/app
      - ./contracts:/app/contracts:ro
    ports:
      - "8001:8001"
    depends_on:
      - backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # Frontend — run locally with `cd frontend && npm run dev`
  # (not dockerized to avoid native binary issues with lightningcss/tailwind)

networks:
  default:
    name: bantay-dagitab-network

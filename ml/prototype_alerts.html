<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ML Alerts Prototype</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --warn: #b91c1c;
      --ok: #047857;
      --border: #e5e7eb;
    }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 4px 0;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
    }
    main {
      padding: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .controls input {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      min-width: 220px;
    }
    .controls button {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--accent);
      color: white;
      cursor: pointer;
    }
    .status {
      font-size: 13px;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .pill {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 999px;
      display: inline-block;
      background: #fee2e2;
      color: var(--warn);
      border: 1px solid #fecaca;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
    }
    .label {
      color: var(--muted);
    }
    .msg {
      font-size: 13px;
      line-height: 1.3;
    }
    .empty {
      padding: 20px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      background: var(--card);
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>ML Anomaly Alerts (Prototype)</h1>
    <div class="sub">Live view of Contract C output from the ML inference pipeline.</div>
  </header>
  <main>
    <div class="controls">
      <input id="apiUrl" type="text" value="http://localhost:8001/db/alerts?limit=20" />
      <button id="refreshBtn">Refresh</button>
      <div id="status" class="status">Idle</div>
    </div>
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">No alerts found.</div>
  </main>

  <script>
    const grid = document.getElementById("grid");
    const statusEl = document.getElementById("status");
    const emptyEl = document.getElementById("empty");
    const apiUrl = document.getElementById("apiUrl");

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#b91c1c" : "#6b7280";
    }

    function renderAlerts(alerts) {
      grid.innerHTML = "";
      if (!alerts || alerts.length === 0) {
        emptyEl.style.display = "block";
        return;
      }
      emptyEl.style.display = "none";

      alerts.forEach((alert) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="row">
            <div><strong>${alert.device_id || "unknown"}</strong></div>
            <span class="pill">${alert.alert_type || "ALERT"}</span>
          </div>
          <div class="row"><span class="label">User</span><span>${alert.user_account_id || "-"}</span></div>
          <div class="row"><span class="label">Time</span><span>${alert.timestamp || "-"}</span></div>
          <div class="row"><span class="label">Expected</span><span>${alert.expected_wattage_range || "-"}</span></div>
          <div class="row"><span class="label">Actual</span><span>${Number(alert.actual_wattage || 0).toFixed(2)} W</span></div>
          <div class="msg">${alert.message || ""}</div>
        `;

        grid.appendChild(card);
      });
    }

    async function loadAlerts() {
      const url = apiUrl.value.trim();
      if (!url) {
        setStatus("API URL is empty", true);
        return;
      }
      setStatus("Loading...");
      try {
        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const data = await res.json();
        renderAlerts(data);
        setStatus(`Loaded ${data.length} alerts`);
      } catch (err) {
        renderAlerts([]);
        setStatus(`Error: ${err.message}`, true);
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadAlerts);
    loadAlerts();
  </script>
</body>
</html>

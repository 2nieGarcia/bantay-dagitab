deployment:
  model_path: models/deployed/model.joblib
  model_type: lightgbm
  previous_model_path: models/deployed/model_previous.joblib

database:
  path: data/deployment.db

anomaly:
  thresholds:
    default:
      k: 1.8
      sigma_residuals: 289.95
    meter_manila_001:
      k: 2.8
      sigma_residuals: 85.0
    meter_manila_101:
      k: 1.8
      sigma_residuals: 199.88
    meter_manila_102:
      k: 1.8
      sigma_residuals: 360.8
    meter_manila_103:
      k: 1.8
      sigma_residuals: 305.66
    meter_manila_104:
      k: 1.8
      sigma_residuals: 230.95
    meter_manila_105:
      k: 1.8
      sigma_residuals: 207.58
    meter_manila_106:
      k: 1.8
      sigma_residuals: 300.52
    meter_manila_107:
      k: 1.8
      sigma_residuals: 376.4
    meter_manila_108:
      k: 1.8
      sigma_residuals: 279.38
    meter_manila_109:
      k: 2.16
      sigma_residuals: 263.4
    meter_manila_110:
      k: 2.28
      sigma_residuals: 305.14
  sustained_window: 3

inference:
  lookback_minutes: 2000000
  batch_size: 1000
  # Rolling history window used to build lag/rolling features when a
  # joblib model is loaded. 7 days is plenty for the lag_96 (24h) feature
  # plus a safety margin; values in the hundreds scan the entire table on
  # every pass and are a perf bomb under load.
  history_days: 7

logging:
  level: INFO
  predictions_log: true